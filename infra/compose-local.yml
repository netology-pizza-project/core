version: "3"
services:
  frontend:
    image: pizza-front:0.3
    build: ../frontend
    depends_on:
      - backend
      - database
    networks:
      - frontend
    ports:
      - "8888:8888"
  backend:
    image: pizza-back:0.9
    build: ../backend
    depends_on:
      database:
        condition: service_healthy
    networks:
      - frontend
      - backend
  database:
    image: postgres:14
    command: -c 'max_connections=1000'
    environment:
      POSTGRES_DB: "pizza"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    expose:
      - 5432
    networks:
      - backend
    healthcheck:
      test: 'pg_isready -U postgres --dbname=pizza'
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  frontend:
  backend: